{% extends "base.html" %}
{% load socialaccount %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<section class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="glass-panel p-4 p-lg-5">
            <p class="text-uppercase text-muted mb-2">New Account</p>
            <h2 class="mb-4">Create Your Account</h2>
            <form method="post" action="{% url 'account_signup' %}">
                {% csrf_token %}
                {{ form.as_p }}
                {% if redirect_field_value %}
                    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
                {% endif %}
                <button type="submit" class="neon-btn w-100 mb-3">Create Account</button>
            </form>
            <a href="{% provider_login_url 'google' process='signup' %}" class="neon-link w-100 mb-3">Sign up with Google</a>
            <p class="text-muted mb-0">Already registered? <a href="{% url 'account_login' %}" class="text-success">Login here</a>.</p>
        </div>
    </div>
</section>
{% endblock %}
