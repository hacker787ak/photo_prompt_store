<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.title }}</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .locked-box { background: #222; padding: 20px; border: 2px dashed #ff0000; border-radius: 10px; margin-top: 20px;}
        .unlocked-box { background: #113311; padding: 20px; border: 2px solid #00ff00; border-radius: 10px; margin-top: 20px;}
        .btn { background: #00ff00; color: #000; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
        img { width: 90%; max-width: 400px; border-radius: 8px; }
    </style>
    <script>
        document.addEventListener('visibilitychange', () => { 
            document.body.style.display = document.hidden ? 'none' : 'block'; 
        });
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</head>
<body>
    <h2>{{ item.title }}</h2>
    <img src="{{ item.image.url }}" alt="Prompt Image">
    <p>{{ item.description }}</p>

    {% if unlocked %}
        <div class="unlocked-box">
            <h3>✅ Prompt Unlocked</h3>
            <p id="promptText" style="user-select: all; background: #000; padding: 10px;">{{ item.prompt_text }}</p>
            <button onclick="navigator.clipboard.writeText(document.getElementById('promptText').innerText); alert('Prompt Copied!');" class="btn">Copy Prompt</button>
        </div>
    {% else %}
        <div class="locked-box">
            <h3>🔒 Prompt Locked</h3>
            <p>Pay ₹{{ item.price }} to unlock this premium prompt.</p>
            <a href="/checkout/{{ item.id }}/" class="btn">Pay Now</a>
        </div>
    {% endif %}
    <br><br>
    <a href="/" style="color: #aaa;">Back to Home</a>
</body>
</html>
