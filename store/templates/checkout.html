<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Unlock</title>
    <style>
        body { background: #050a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #0a1414; border: 1px solid #00ffaa; padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; }
        .pay-btn { background: #00ffaa; color: #000; padding: 15px; display: block; border-radius: 12px; text-decoration: none; font-weight: bold; margin: 15px 0; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; font-size: 16px; }
        #loader { display: none; color: #00ffaa; margin-top: 15px; }
        .spinner { border: 4px solid #111; border-top: 4px solid #00ffaa; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box" id="pay-box">
        <h3>🔒 Payment Security</h3>
        <p>Total: <span style="color:#00ffaa;">₹{{ item.price }}</span></p>
        <a href="upi://pay?pa=9653314458@naviaxis&pn=AK_STORE&am={{ item.price }}&cu=INR" class="pay-btn">PAY WITH UPI APP</a>
        
        <form id="payForm" method="POST">
            {% csrf_token %}
            <input type="text" name="utr_number" id="utr" placeholder="Enter 12-digit UTR/Ref No." required>
            <button type="submit" onclick="showLoader()" style="background:#00ffaa; width:100%; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">VERIFY & UNLOCK</button>
        </form>

        <div id="loader">
            <div class="spinner"></div>
            <p>Connecting to Bank API...<br><span style="font-size:10px;">Verifying Transaction ID</span></p>
        </div>

        {% if error %}<p style="color:#ff3333; font-size:13px; margin-top:10px;">{{ error }}</p>{% endif %}
    </div>

    <script>
    function showLoader() {
        var utr = document.getElementById("utr").value;
        if(utr.length == 12) {
            document.getElementById("payForm").style.display = "none";
            document.getElementById("loader").style.display = "block";
        }
    }
    </script>
</body>
</html>
